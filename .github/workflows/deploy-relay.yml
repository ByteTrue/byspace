name: Deploy Relay

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/relay/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-relay.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/npm-retry.mjs ci --workspace=@bytetrue/byspace-relay --include-workspace-root

      - name: Typecheck
        run: npm run typecheck --workspace=@bytetrue/byspace-relay

      - name: Deploy worker
        run: cd packages/relay && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
