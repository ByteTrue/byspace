name: Deploy App

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-app-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' && (github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')) }}
    env:
      EXPECTED_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_SHA }}
          fetch-depth: 0

      - name: Reject stale deployment
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test "$EXPECTED_SHA" = "$(git rev-parse origin/main)"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/npm-retry.mjs ci

      - name: Build app dependencies
        run: npm run build:app-deps

      - name: Typecheck
        run: npm run typecheck --workspace=@bytetrue/byspace-app

      - name: Export Web app
        run: cd packages/app && npx expo export --platform web

      - name: Recheck current main
        run: |
          git fetch origin main
          test "$EXPECTED_SHA" = "$(git rev-parse origin/main)"

      - name: Deploy to Cloudflare Pages
        run: cd packages/app && npx wrangler pages deploy dist --project-name byspace --branch main --commit-hash "$EXPECTED_SHA" --commit-dirty=false
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 835cd580057df97323a7854a8069c5f1
