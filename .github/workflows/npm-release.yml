name: Publish npm

on:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for Trusted Publishing
        run: npm install --global npm@12.0.1

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node -e '
            if (!/^v\d+\.\d+\.\d+(?:-beta\.\d+)?$/.test(process.env.RELEASE_TAG)) {
              throw new Error(`Unsupported release tag ${process.env.RELEASE_TAG}`);
            }
            const version = require("./package.json").version;
            const expected = `v${version}`;
            if (process.env.RELEASE_TAG !== expected) {
              throw new Error(`Tag ${process.env.RELEASE_TAG} does not match ${expected}`);
            }
          '

      - name: Require current main and exact-SHA CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          sha="$(git rev-parse HEAD)"
          test "$sha" = "$(git rev-parse origin/main)"
          successes="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow CI --commit "$sha" --event push --status success --json databaseId --jq 'length')"
          test "$successes" -ge 1

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run release:check

      - name: Check whether this version is already published
        id: registry
        run: |
          version="$(node -p 'require("./package.json").version')"
          if npm view "@bytetrue/byspace@${version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Recheck current main
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Publish stable package
        if: ${{ !contains(github.ref_name, '-') && steps.registry.outputs.published != 'true' }}
        run: npm run release:publish

      - name: Publish beta package
        if: ${{ contains(github.ref_name, '-') && steps.registry.outputs.published != 'true' }}
        run: npm run release:publish:beta

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          node scripts/sync-release-notes-from-changelog.mjs
          --repo "${{ github.repository }}"
          --tag "${{ github.ref_name }}"
          --create-if-missing
