name: Publish npm

on:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-release-${{ contains(github.ref_name, '-') && 'beta' || 'stable' }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for Trusted Publishing
        run: npm install --global npm@12.0.1

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node -e '
            if (!/^v\d+\.\d+\.\d+(?:-beta\.\d+)?$/.test(process.env.RELEASE_TAG)) {
              throw new Error(`Unsupported release tag ${process.env.RELEASE_TAG}`);
            }
            const version = require("./package.json").version;
            const expected = `v${version}`;
            if (process.env.RELEASE_TAG !== expected) {
              throw new Error(`Tag ${process.env.RELEASE_TAG} does not match ${expected}`);
            }
          '

      - name: Require current main and exact-SHA CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          sha="$(git rev-parse HEAD)"
          test "$sha" = "$(git rev-parse origin/main)"
          successes="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow CI --commit "$sha" --event push --status success --json databaseId --jq 'length')"
          test "$successes" -ge 1

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run release:check

      - name: Check whether this version is already published
        id: registry
        run: |
          version="$(node -p 'require("./package.json").version')"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "https://registry.npmjs.org/@bytetrue%2Fbyspace/${version}")"
          case "$status" in
            200) echo "published=true" >> "$GITHUB_OUTPUT" ;;
            404) echo "published=false" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "npm registry returned HTTP $status for @bytetrue/byspace@$version" >&2
              exit 1
              ;;
          esac

      - name: Recheck current main
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Publish stable package
        if: ${{ !contains(github.ref_name, '-') && steps.registry.outputs.published != 'true' }}
        run: npm run release:publish

      - name: Publish beta package
        if: ${{ contains(github.ref_name, '-') && steps.registry.outputs.published != 'true' }}
        run: npm run release:publish:beta

      - name: Verify npm release channel
        run: |
          version="$(node -p 'require("./package.json").version')"
          if [[ "$version" == *-* ]]; then
            dist_tag=beta
          else
            dist_tag=latest
          fi
          for attempt in {1..72}; do
            published_version="$(npm view "@bytetrue/byspace@$dist_tag" version 2>/dev/null || true)"
            if [[ "$published_version" == "$version" ]]; then
              exit 0
            fi
            echo "attempt $attempt/72: npm $dist_tag resolved to '${published_version:-nothing}', waiting for '$version'"
            if (( attempt < 72 )); then
              sleep 5
            fi
          done
          echo "npm $dist_tag resolved to '${published_version:-nothing}', expected '$version'" >&2
          exit 1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          node scripts/sync-release-notes-from-changelog.mjs
          --repo "${{ github.repository }}"
          --tag "${{ github.ref_name }}"
          --create-if-missing
