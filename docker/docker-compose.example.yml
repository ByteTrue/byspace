# Minimal self-built BySpace daemon + web UI deployment.
#
# From the repository root, run:
#   docker compose -f docker/docker-compose.example.yml up -d --build
# Then open http://localhost:6777.
# For any network-reachable deployment, change BYSPACE_PASSWORD first.
services:
  byspace:
    build:
      context: ..
      dockerfile: docker/base/Dockerfile
    image: byspace:local
    container_name: byspace
    restart: unless-stopped
    ports:
      - "6777:6777"
    environment:
      BYSPACE_PASSWORD: "change-me"
      # Add DNS names you use to reach this container. IPs and localhost are
      # already allowed by default.
      # BYSPACE_HOSTNAMES: "byspace.example.com,.lan"
    volumes:
      # Persistent daemon state and agent credentials/config.
      - ../byspace-home:/home/byspace
      # Code visible to BySpace and the agents it launches.
      - ../workspace:/workspace
